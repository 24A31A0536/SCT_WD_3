<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Test - Web Development Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <!-- Topic Selection Screen -->
    <div id="topic-ui">
        <div class="topic-section">
            <h1>Skill Test</h1>
            <p>Enter a topic to generate quiz questions</p>
            <div class="input-group">
                <input type="text" id="topic-input" placeholder="e.g., Web Development, Python, History, Science..." class="topic-input">
                <button id="start-btn" class="btn-start">Start Quiz</button>
            </div>
            <p class="loading-text" id="loading-text"></p>
        </div>
    </div>

    <!-- Quiz UI -->
    <div id="quiz-ui" class="hide">
        <div class="header">
            <h1>Skill Test</h1>
            <span class="progress" id="progress-text">Question 1 of 10</span>
        </div>
        
        <div class="question-section">
            <p class="question-text" id="question-text">Loading question...</p>
            <div id="answer-container"></div>
        </div>

        <div class="navigation-box">
            <button class="btn-nav" id="prev-btn">Previous</button>
            <button class="btn-nav" id="next-btn">Next</button>
            <button class="btn-submit hide" id="submit-btn">Submit</button>
        </div>
    </div>

    <!-- Results UI -->
    <div id="results-ui" class="hide">
        <div class="results">
            <h2>Quiz Completed!</h2>
            <p>Your overall score is:</p>
            <div class="score" id="score-text">0 / 10</div>
            <p id="feedback-text"></p>
            <button class="restart-btn" id="restart-btn">Try Again</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
